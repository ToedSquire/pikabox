name: Build Pikabox Live ISO
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install KIWI Engine and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils debootstrap ubuntu-keyring xorriso squashfs-tools
          sudo pip3 install --break-system-packages kiwi kiwi_boxed_plugin

      - name: Pre-Bootstrap and inject Keyrings Natively
        run: |
          # Manually create the target root
          sudo mkdir -p ./build_output/build/image-root
          
          # 1. Debootstrap the base
          sudo debootstrap --arch=amd64 plucky ./build_output/build/image-root http://archive.ubuntu.com/ubuntu/
          
          # 2. Inject the master archive keys directly inside the chroot's trusted folder
          sudo mkdir -p ./build_output/build/image-root/etc/apt/trusted.gpg.d/
          sudo cp /usr/share/keyrings/ubuntu-archive-keyring.gpg ./build_output/build/image-root/etc/apt/trusted.gpg.d/
          
          # 3. Prime the chroot apt cache so KIWI doesn't panic
          sudo chroot ./build_output/build/image-root apt-get update

      - name: Build Live Image
        run: |
          sudo DEBIAN_FRONTEND=noninteractive kiwi-ng system build \
            --description ./ \
            --target-dir ./build_output \
            --allow-existing-root
