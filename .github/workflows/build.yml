name: Build Pikabox Live ISO
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install KIWI Engine and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils debootstrap xorriso squashfs-tools
          sudo pip3 install --break-system-packages kiwi kiwi_boxed_plugin

      - name: Create Global APT Interceptor Wrapper
        run: |
          # Create a custom apt-get binary script that forces signature bypass
          sudo tee /usr/local/bin/apt-get << 'EOF'
          #!/bin/bash
          exec /usr/bin/apt-get \
            -o Acquire::AllowInsecureRepositories=true \
            -o APT::Get::AllowUnauthenticated=true \
            -o Acquire::AllowPublicKeyFileInsecure=true \
            "$@"
          EOF
          sudo chmod +x /usr/local/bin/apt-get

          # Link it into the system path so KIWI calls our wrapper first
          sudo ln -sf /usr/local/bin/apt-get /usr/sbin/apt-get

      - name: Pre-Bootstrap Image Root Natively
        run: |
          sudo rm -rf ./build_output
          sudo mkdir -p ./build_output/build/image-root
          sudo debootstrap --arch=amd64 --no-check-gpg plucky ./build_output/build/image-root http://archive.ubuntu.com/ubuntu/

          # Copy our special interceptor inside the chroot as well so KIWI cannot escape it!
          sudo cp /usr/local/bin/apt-get ./build_output/build/image-root/usr/local/bin/apt-get
          sudo ln -sf /usr/local/bin/apt-get ./build_output/build/image-root/usr/bin/apt-get
          sudo ln -sf /usr/local/bin/apt-get ./build_output/build/image-root/usr/sbin/apt-get

      - name: Build Live Image
        run: |
          sudo DEBIAN_FRONTEND=noninteractive kiwi-ng system build \
            --description ./ \
            --target-dir ./build_output \
            --allow-existing-root
