name: Build Pikabox Live ISO
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install KIWI Engine and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils debootstrap xorriso squashfs-tools
          sudo pip3 install --break-system-packages kiwi kiwi_boxed_plugin

      - name: Pre-Bootstrap and Force Trusted Sources
        run: |
          # 1. Clear out any failed runs and build the base
          sudo rm -rf ./build_output
          sudo mkdir -p ./build_output/build/image-root
          sudo debootstrap --arch=amd64 --no-check-gpg plucky ./build_output/build/image-root http://archive.ubuntu.com/ubuntu/
          
          # 2. Overwrite the sandbox sources list to force trust the repositories
          sudo mkdir -p ./build_output/build/image-root/etc/apt/
          sudo tee ./build_output/build/image-root/etc/apt/sources.list << 'EOF'
          deb [trusted=yes] http://archive.ubuntu.com/ubuntu/ plucky main universe multiverse restricted
          deb [trusted=yes] http://archive.ubuntu.com/ubuntu/ plucky-updates main universe multiverse restricted
          EOF
          
          # 3. Pre-update the cache so KIWI inherits a working package state
          sudo chroot ./build_output/build/image-root apt-get update || true

      - name: Build Live Image
        run: |
          sudo DEBIAN_FRONTEND=noninteractive kiwi-ng system build \
            --description ./ \
            --target-dir ./build_output \
            --allow-existing-root
