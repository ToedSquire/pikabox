name: Build Pikabox Live ISO
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install KIWI Engine and Bootstrapping Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils debootstrap ubuntu-keyring
          sudo pip3 install --break-system-packages kiwi kiwi_boxed_plugin

      - name: Build Live Image
        run: |
          sudo mkdir -p ./build_output
          sudo DEBIAN_FRONTEND=noninteractive kiwi-ng system build \
            --description ./ \
            --target-dir ./build_output
