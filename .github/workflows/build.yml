name: Build Pikabox Live ISO
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install KIWI Engine and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils debootstrap xorriso squashfs-tools
          sudo pip3 install --break-system-packages kiwi kiwi_boxed_plugin

      - name: Pre-Bootstrap and Configure Insecure APT Natively
        run: |
          # 1. Clean out the old broken loop and build the base root
          sudo rm -rf ./build_output
          sudo mkdir -p ./build_output/build/image-root
          sudo debootstrap --arch=amd64 --no-check-gpg plucky ./build_output/build/image-root http://archive.ubuntu.com/ubuntu/

          # 2. Inject a global configuration file directly into the sandbox's APT directory
          sudo mkdir -p ./build_output/build/image-root/etc/apt/apt.conf.d/
          sudo tee ./build_output/build/image-root/etc/apt/apt.conf.d/99insecure << 'EOF'
          Acquire::AllowInsecureRepositories "true";
          Acquire::AllowPublicKeyFileInsecure "true";
          APT::Get::AllowUnauthenticated "true";
          EOF

      - name: Build Live Image
        run: |
          sudo DEBIAN_FRONTEND=noninteractive kiwi-ng system build \
            --description ./ \
            --target-dir ./build_output \
            --allow-existing-root
