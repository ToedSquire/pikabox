name: Build Pikabox Live ISO
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install KIWI Engine and Complete Plugins
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils
          # Install the main engine alongside the backend build command plugins
          sudo pip3 install --break-system-packages kiwi kiwi_boxed_plugin

      - name: Build Live Image
        run: |
          sudo mkdir -p ./build_output
          sudo kiwi-ng system build \
            --description ./ \
            --target-dir ./build_output

      - name: Upload Finished ISO
        uses: actions/upload-artifact@v4
        with:
          name: pikabox-twilight-iso
          path: ./build_output/*.iso
