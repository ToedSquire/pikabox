name: Build Pikabox Live ISO
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install KIWI Engine and Complete Plugins
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils
          sudo pip3 install --break-system-packages kiwi kiwi_boxed_plugin

      - name: Force Global APT Trust Override
        run: |
          # Force the host machine and sub-processes to completely allow unsigned sources
          sudo mkdir -p /etc/apt/apt.conf.d/
          echo 'APT::Get::AllowUnauthenticated "true";' | sudo tee /etc/apt/apt.conf.d/99allow-unauthenticated
          echo 'Acquire::AllowInsecureRepositories "true";' | sudo tee -a /etc/apt/apt.conf.d/99allow-unauthenticated

      - name: Build Live Image
        run: |
          sudo mkdir -p ./build_output
          sudo DEBIAN_FRONTEND=noninteractive kiwi-ng system build \
            --description ./ \
            --target-dir ./build_output
