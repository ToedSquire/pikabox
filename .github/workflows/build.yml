name: Build Pikabox Live ISO
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install KIWI and QEMU via Python
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils
          # Break out of the system-managed python block and install the global builder tool
          sudo pip3 install --break-system-packages kiwi

      - name: Build Live Image
        run: |
          sudo mkdir -p ./build_output
          sudo kiwi-ng --profile=default image build \
            --description ./ \
            --target-dir ./build_output

      - name: Upload Finished ISO
        uses: actions/upload-artifact@v4
        with:
          name: pikabox-twilight-iso
          path: ./build_output/*.iso
